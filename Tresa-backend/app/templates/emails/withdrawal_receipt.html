<!doctype html>
<html><body style="margin:0;background:#f6f7f9;font-family:Arial,sans-serif;color:#171717">
<div style="max-width:520px;margin:32px auto;background:#fff;border:1px solid #e5e7eb;padding:28px">
<p style="font-size:12px;color:#6b7280;margin:0 0 8px">RENULT PAYMENT RECEIPT</p>
<h1 style="font-size:20px;margin:0 0 4px">Withdrawal completed</h1>
<p style="font-size:12px;color:#6b7280;margin:0 0 22px">Transaction $transaction_id</p>
<table style="width:100%;border-collapse:collapse;font-size:14px">
<tr><td style="padding:8px 0;color:#6b7280">Recipient</td><td style="padding:8px 0;text-align:right;font-weight:600">$recipient_name</td></tr>
<tr><td style="padding:8px 0;color:#6b7280">Phone</td><td style="padding:8px 0;text-align:right">$recipient_phone</td></tr>
<tr><td style="padding:8px 0;color:#6b7280">Provider</td><td style="padding:8px 0;text-align:right">$provider</td></tr>
<tr><td style="padding:8px 0;color:#6b7280">Amount</td><td style="padding:8px 0;text-align:right">UGX $amount</td></tr>
<tr><td style="padding:8px 0;color:#6b7280">Fee</td><td style="padding:8px 0;text-align:right">UGX $fee</td></tr>
<tr style="border-top:1px solid #e5e7eb"><td style="padding:12px 0;font-weight:700">Recipient receives</td><td style="padding:12px 0;text-align:right;font-size:18px;font-weight:700;color:#059669">UGX $net_amount</td></tr>
</table><p style="font-size:12px;color:#6b7280;margin-top:20px">$created_at</p>
</div></body></html>
